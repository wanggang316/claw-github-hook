name = "claw-github-hook"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[observability.logs]
enabled = true

[[kv_namespaces]]
binding = "ROUTES_KV"
id = "32657c43ae9249c5822ac4389b32388e"

# Secrets (set via `wrangler secret put`):
# GITHUB_WEBHOOK_SECRET — GitHub webhook HMAC secret
# AUTO_REVIEW           — "true" or "false", global default for auto PR review
# TOKEN_PROJ1, TOKEN_PROJ2, ... — per-route OpenClaw tokens referenced in KV routes config
